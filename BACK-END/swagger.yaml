    UserInput:
      type: object
      description: |
        Para crear: username, password y full_name son obligatorios.
        Para actualizar: todos los campos son opcionales.
        Si se envía password, se rehashea con bcrypt.
      properties:
        username:
          type: string
        password:
          type: string
          description: Contraseña en texto plano (se almacena hasheada)
        full_name:
          type: string
        role:
          type: string
          enum: [ADMIN, OPERADOR, SUPERVISOR]
          default: OPERADOR
        dni:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, BLOCKED, INACTIVE]
          default: ACTIVE
